<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Job Seeker Ultimate</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body class="bg-gray-50 font-sans">

    <h1>Contact Us</h1>
    <form id="form">
        <!--Name input-->
        <label for="full-name" class="label">Name:</label>
        <input type="text" id="full-name" class="input" name="name" placeholder="Full name" size="30" required>
    
        <!--Email input-->
        <label for="email" class="label">Email Address:</label>
        <input type="email" id="email" class="input" name="email" placeholder="Valid email address" size="30" required>
    
        <!--Contact Details input-->
        <label for="contact-details" class="label">Contact Details:</label>
        <input type="tel" id="contact-details" class="input" name="contact" placeholder="Personal/Home/Office Tel No." size="30" required>
        
        <p></p>

        <fieldset>
            <!--Role input-->
            <legend>Are you an employer or a job seeker?</legend>
            <label class="label"><input id="radio-btn-1" type="radio" name="role" value="employer" required> Employer</label>
            <label class="label"><input id="radio-btn-2" type="radio" name="role" value="job-seeker"> Job Seeker</label>
        </fieldset>

        <!--Message input-->
        <label for="message" class="label">Your message:</label>
        <textarea id="message" name="message" rows="8" cols="60" placeholder="Feel free to ask us anything..." minlength="10" required ></textarea>

        <!--Privacy Policy Checkbox-->
        <label class="label">
            <input id="checkbox" type="checkbox" name="privacy-consent" required>
            By checking in this box, I acknowledge and agree to the <a id="privacy-link" href="privacy.html" target="_blank">Privacy Policy</a>
        </label>

        <!--Submit button-->
        <button type="submit" id="submit-btn">Send Form</button>
    </form>

    <script src="js/script.js"></script>
    
</body>
</html>
